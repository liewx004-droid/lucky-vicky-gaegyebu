  <!-- screen -->
  <rect x="148" y="80" width="104" height="170" rx="6" fill="#38bdf8"/>
  <!-- screen content -->
  <rect x="156" y="90" width="88" height="12" rx="3" fill="#0ea5e9" opacity="0.7"/>
  <rect x="156" y="108" width="60" height="8" rx="3" fill="white" opacity="0.5"/>
  <rect x="156" y="120" width="88" height="50" rx="4" fill="#0369a1" opacity="0.5"/>
