<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f0fdf4"/>
  <!-- pot -->
  <path d="M 155 280 L 165 340 L 235 340 L 245 280 Z" fill="#ea580c"/>
  <rect x="145" y="268" width="110" height="16" rx="6" fill="#f97316"/>
  <!-- soil -->
  <ellipse cx="200" cy="276" rx="52" ry="10" fill="#78350f"/>
  <!-- stem main -->
  <path d="M 200 275 Q 200 220 200 180" stroke="#15803d" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- stem left 1 -->
  <path d="M 200 240 Q 175 225 155 215" stroke="#15803d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- stem right 1 -->
  <path d="M 200 220 Q 225 205 248 198" stroke="#15803d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- stem left 2 -->
  <path d="M 200 195 Q 170 178 148 170" stroke="#15803d" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- leaf big left 1 -->
  <ellipse cx="148" cy="208" rx="30" ry="14" fill="#16a34a" transform="rotate(-20 148 208)"/>
  <!-- leaf big right 1 -->
  <ellipse cx="252" cy="192" rx="28" ry="13" fill="#15803d" transform="rotate(15 252 192)"/>
  <!-- leaf left 2 -->
  <ellipse cx="142" cy="162" rx="26" ry="12" fill="#22c55e" transform="rotate(-30 142 162)"/>
  <!-- leaf top -->
  <ellipse cx="200" cy="150" rx="22" ry="32" fill="#16a34a" transform="rotate(-5 200 150)"/>
  <ellipse cx="215" cy="148" rx="20" ry="28" fill="#15803d" transform="rotate(10 215 148)"/>
  <!-- pot pattern -->
  <line x1="175" y1="290" x2="170" y2="335" stroke="#c2410c" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="290" x2="200" y2="340" stroke="#c2410c" stroke-width="1.5" opacity="0.5"/>
  <line x1="225" y1="290" x2="230" y2="335" stroke="#c2410c" stroke-width="1.5" opacity="0.5"/>
  <!-- label -->
  <text x="200" y="372" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#14532d">관엽식물</text>
  <text x="200" y="396" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#166534">식물</text>
</svg>
